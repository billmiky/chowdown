---
layout: default
---

<div class="bauhaus-home-layout">

  <aside class="home-sidebar">
    <div class="sidebar-content">
      <div class="site-title">
        <span class="icon">YY</span> 
        RECIPES
      </div>
      
      <nav>
        <a href="#" class="nav-item">Search</a>
        <a href="#" class="nav-item">Books</a>
        <a href="#" class="nav-item">Updates</a>
      </nav>

      <div class="sidebar-footer">
        Bauhaus Edition
      </div>
    </div>
  </aside>

  <main class="home-grid-container">
    
    <div class="header-wrapper">
      <h2 class="section-header">Most Recent</h2>
    </div>

    <div class="recipe-grid">
      {% assign recipes = site.recipes | sort: 'date' | reverse %}
      
      {% for post in recipes %}
      <a href="{{ post.url | relative_url }}" class="recipe-card">
        
        <div class="card-image-box">
          <div class="card-image" style="background-image: url('{{ site.baseurl }}/images/{{ post.image }}');"></div>
          {% unless post.image %}
            <div class="no-image-pattern">NO IMG</div>
          {% endunless %}
        </div>

        <div class="card-text">
          <h3 class="card-title">{{ post.title }}</h3>
          <span class="card-arrow">→</span>
        </div>
      </a>
      {% endfor %}
    </div>
  </main>

</div>

<style>
  /* --- 1. CRITICAL RESET --- */
  /* This ensures borders and padding don't break width calculations */
  * {
    box-sizing: border-box;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    background-color: #f8f8f8; /* Light grey canvas */
  }

  .bauhaus-home-layout {
    display: flex;
    min-height: 100vh;
  }

  /* --- 2. SIDEBAR (Fixed Left) --- */
  .home-sidebar {
    width: 280px; /* Fixed width */
    background: #fff;
    border-right: 8px solid #000; /* Thicker Bauhaus Line */
    position: fixed;
    height: 100vh;
    top: 0;
    left: 0;
    z-index: 50;
    padding: 40px;
    display: flex;
    flex-direction: column;
  }

  /* Sidebar Elements */
  .site-title {
    font-family: 'Jost', sans-serif !important;
    font-weight: 900;
    font-size: 2rem;
    color: #E63946;
    margin-bottom: 60px;
    display: flex;
    align-items: center;
    gap: 15px;
    line-height: 1;
  }

  .nav-item {
    display: block;
    font-family: 'Jost', sans-serif !important;
    font-size: 1.5rem;
    font-weight: 700;
    color: #000;
    text-decoration: none;
    margin-bottom: 20px;
    border-bottom: 3px solid transparent;
  }

  .nav-item:hover {
    color: #E63946;
    border-bottom: 3px solid #E63946;
  }

  /* --- 3. MAIN CONTENT (The Fix) --- */
  .home-grid-container {
    /* FIX: increased from 280px to 300px to prevent overlap with border */
    margin-left: 300px; 
    padding: 60px;
    width: 100%;
    background-color: #f8f8f8;
  }

  .header-wrapper {
    margin-bottom: 30px;
    border-bottom: 5px solid #000; /* Underline the whole header area */
    padding-bottom: 10px;
    display: inline-block; /* Wraps tightly around text */
  }

  .section-header {
    font-family: 'Jost', sans-serif !important;
    font-size: 1.5rem;
    font-weight: 900;
    text-transform: uppercase;
    color: #000;
    margin: 0;
    letter-spacing: 1px;
  }

  /* --- 4. GRID --- */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 40px;
  }

  .recipe-card {
    display: block;
    background: #fff;
    border: 4px solid #000;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .recipe-card:hover {
    transform: translate(-6px, -6px);
    box-shadow: 12px 12px 0px 0px #000;
    z-index: 10;
  }

  .card-image-box {
    height: 220px;
    width: 100%;
    border-bottom: 4px solid #000;
    background: #ddd;
    overflow: hidden;
  }

  .card-image {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 0.4s;
  }

  .recipe-card:hover .card-image {
    transform: scale(1.1);
  }

  .card-text {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    font-family: 'Jost', sans-serif !important;
    font-weight: 800;
    font-size: 1.3rem;
    color: #000;
    text-transform: uppercase;
    line-height: 1.1;
    margin: 0;
  }

  .card-arrow {
    color: #E63946;
    font-weight: 900;
    font-size: 1.5rem;
  }

  /* --- MOBILE RESPONSIVE --- */
  @media (max-width: 900px) {
    .bauhaus-home-layout { flex-direction: column; }
    
    .home-sidebar {
      width: 100%;
      height: auto;
      position: relative;
      border-right: none;
      border-bottom: 5px solid #000;
      padding: 20px;
    }
    
    .home-grid-container {
      margin-left: 0; /* Reset margin on mobile */
      padding: 20px;
    }
    
    .sidebar-footer { display: none; }
  }
</style>
